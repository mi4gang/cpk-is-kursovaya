<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удостоверения | ЦПК ИС</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        :root { --primary: #2563eb; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 380, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
<div th:replace="~{fragments :: roleHeader(${activeItem})}"></div>

<main class="max-w-7xl mx-auto px-5 lg:px-8 py-8 space-y-6">
    <section class="flex flex-wrap items-start justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold tracking-tight">Реестр удостоверений</h1>
            <p class="text-slate-500 mt-1">Выдача удостоверений доступна только после успешной аттестации и завершения обучения преподавателем.</p>
        </div>
        <a th:href="@{/certificates/new}" class="px-3 py-2 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700">+ Добавить удостоверение</a>
    </section>

    <section class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
        <div class="overflow-auto">
            <table class="w-full min-w-[900px] text-sm">
                <thead class="bg-slate-50 text-slate-500 uppercase text-xs">
                <tr>
                    <th class="px-4 py-3 text-left">ID</th>
                    <th class="px-4 py-3 text-left">Номер</th>
                    <th class="px-4 py-3 text-left">Заявка</th>
                    <th class="px-4 py-3 text-left">Дата выдачи</th>
                    <th class="px-4 py-3 text-left">Статус</th>
                    <th class="px-4 py-3 text-left">Ссылка</th>
                    <th class="px-4 py-3 text-left">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${certificates}" class="border-t border-slate-100 hover:bg-slate-50/70">
                    <td class="px-4 py-3" th:text="${c.id}"></td>
                    <td class="px-4 py-3 font-semibold" th:text="${c.number}"></td>
                    <td class="px-4 py-3" th:text="${c.application.id}"></td>
                    <td class="px-4 py-3" th:text="${c.issueDate}"></td>
                    <td class="px-4 py-3">
                        <span th:if="${c.status.name() == 'ISSUED'}" class="px-2 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-700" th:text="${c.status.label}"></span>
                        <span th:if="${c.status.name() == 'NOT_ISSUED'}" class="px-2 py-1 rounded-full text-xs font-semibold bg-slate-100 text-slate-600" th:text="${c.status.label}"></span>
                    </td>
                    <td class="px-4 py-3">
                        <a th:if="${c.documentLink != null and !c.documentLink.isBlank()}" th:href="${c.documentLink}" target="_blank" class="text-blue-600 text-sm hover:underline">Открыть</a>
                        <span th:if="${c.documentLink == null or c.documentLink.isBlank()}" class="text-slate-400">—</span>
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <a th:href="@{/certificates/{id}/edit(id=${c.id})}" class="px-3 py-1.5 rounded-lg border border-slate-200 text-xs hover:bg-slate-50">Редактировать</a>
                            <form th:action="@{/certificates/{id}/delete(id=${c.id})}" method="post" class="inline"
                                  onsubmit="return confirm('Удалить удостоверение? Действие необратимо.');">
                                <button type="submit" class="px-3 py-1.5 rounded-lg border border-rose-200 text-rose-600 text-xs hover:bg-rose-50">Удалить</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(certificates)}"><td colspan="7" class="px-4 py-8 text-center text-slate-500">Нет удостоверений.</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
