<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная | ЦПК ИС</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: topnav}"></div>
<main class="container">
    <h1>Панель управления</h1>
    <section class="stats-grid">
        <article class="card">
            <h2>Слушатели</h2>
            <p class="metric" th:text="${totalListeners}">0</p>
        </article>
        <article class="card">
            <h2>Активные программы</h2>
            <p class="metric" th:text="${activePrograms}">0</p>
        </article>
        <article class="card">
            <h2>Сумма оплат</h2>
            <p class="metric" th:text="${#numbers.formatDecimal(paidAmount,1,'COMMA',2,'POINT')} + ' ₽'">0 ₽</p>
        </article>
    </section>

    <section class="card">
        <h2>Программы</h2>
        <table>
            <thead>
            <tr><th>Название</th><th>Часы</th><th>Период</th><th>Активна</th></tr>
            </thead>
            <tbody>
            <tr th:each="p : ${programs}">
                <td th:text="${p.title}"></td>
                <td th:text="${p.durationHours}"></td>
                <td th:text="${p.startDate + ' - ' + p.endDate}"></td>
                <td th:text="${p.active ? 'Да' : 'Нет'}"></td>
            </tr>
            </tbody>
        </table>
    </section>

    <section class="card">
        <h2>Последние заявки</h2>
        <table>
            <thead>
            <tr><th>ID</th><th>Слушатель</th><th>Программа</th><th>Статус</th></tr>
            </thead>
            <tbody>
            <tr th:each="a : ${recentApplications}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.listenerFullName}"></td>
                <td th:text="${a.program.title}"></td>
                <td th:text="${a.status}"></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
