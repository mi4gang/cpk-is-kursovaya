<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата | ЦПК ИС</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: topnav}"></div>
<main class="container">
    <h1 th:text="${payment.id == null ? 'Новая оплата' : 'Редактирование оплаты'}"></h1>

    <form th:action="@{/payments/save}" th:object="${payment}" method="post" class="card form-grid">
        <input type="hidden" th:field="*{id}">

        <label>Заявка
            <select th:field="*{application}" required>
                <option th:each="a : ${applications}" th:value="${a.id}" th:text="${a.id + ' - ' + a.listenerFullName}"></option>
            </select>
        </label>

        <label>Сумма
            <input type="number" step="0.01" th:field="*{amount}" required>
            <small class="err" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></small>
        </label>

        <label>Дата оплаты
            <input type="date" th:field="*{paymentDate}" required>
        </label>

        <label>Статус
            <select th:field="*{status}">
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
            </select>
        </label>

        <div class="row">
            <button type="submit">Сохранить</button>
            <a class="btn" th:href="@{/payments}">Отмена</a>
        </div>
    </form>
</main>
</body>
</html>
