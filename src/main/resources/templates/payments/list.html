<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплаты | ЦПК ИС</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: topnav}"></div>
<main class="container">
    <h1>Оплаты</h1>
    <form method="get" class="row">
        <select name="sort">
            <option value="paymentDate" th:selected="${sort == 'paymentDate'}">Дата оплаты</option>
            <option value="amount" th:selected="${sort == 'amount'}">Сумма</option>
            <option value="status" th:selected="${sort == 'status'}">Статус</option>
        </select>
        <button type="submit">Применить</button>
        <a class="btn" th:href="@{/payments/new}" sec:authorize="hasAnyRole('ADMIN','METHODIST')">+ Добавить оплату</a>
    </form>

    <table>
        <thead>
        <tr><th>ID</th><th>Заявка</th><th>Сумма</th><th>Дата</th><th>Статус</th><th>Действия</th></tr>
        </thead>
        <tbody>
        <tr th:each="p : ${payments}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.application.id}"></td>
            <td th:text="${p.amount}"></td>
            <td th:text="${p.paymentDate}"></td>
            <td th:text="${p.status}"></td>
            <td class="actions" sec:authorize="hasAnyRole('ADMIN','METHODIST')">
                <a th:href="@{/payments/{id}/edit(id=${p.id})}">Редактировать</a>
                <form th:action="@{/payments/{id}/delete(id=${p.id})}" method="post" class="inline">
                    <button type="submit">Удалить</button>
                </form>
            </td>
            <td class="actions" sec:authorize="!hasAnyRole('ADMIN','METHODIST')">Только просмотр</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
