<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплаты | ЦПК ИС</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        :root { --primary: #2563eb; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 380, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
<div th:replace="~{fragments :: roleHeader(${activeItem})}"></div>

<main class="max-w-7xl mx-auto px-5 lg:px-8 py-8 space-y-6">
    <section class="flex flex-wrap items-start justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold tracking-tight">Платежи и финансовые записи</h1>
            <p class="text-slate-500 mt-1">Базовый сценарий: 100% предоплата для открытия полного доступа.</p>
        </div>
        <a th:href="@{/payments/new}" class="inline-flex items-center gap-1 px-3 py-2 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700">
            <span class="material-symbols-outlined !text-lg">add</span>
            Новый платеж
        </a>
    </section>

    <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <article class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
            <p class="text-slate-500 text-sm font-medium uppercase">Всего получено</p>
            <div class="text-2xl font-bold mt-3"
                 th:text="${#aggregates.sum(payments.?[status.name() == 'PAID'].![amount]) != null ? #numbers.formatDecimal(#aggregates.sum(payments.?[status.name() == 'PAID'].![amount]),1,'COMMA',2,'POINT') + ' ₽' : '0,00 ₽'}">0 ₽</div>
        </article>
        <article class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
            <p class="text-slate-500 text-sm font-medium uppercase">Ожидается</p>
            <div class="text-2xl font-bold mt-3"
                 th:text="${#aggregates.sum(payments.?[status.name() == 'PENDING'].![amount]) != null ? #numbers.formatDecimal(#aggregates.sum(payments.?[status.name() == 'PENDING'].![amount]),1,'COMMA',2,'POINT') + ' ₽' : '0,00 ₽'}">0 ₽</div>
        </article>
        <article class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
            <p class="text-slate-500 text-sm font-medium uppercase">Неуспешно</p>
            <div class="text-2xl font-bold mt-3"
                 th:text="${#aggregates.sum(payments.?[status.name() == 'FAILED'].![amount]) != null ? #numbers.formatDecimal(#aggregates.sum(payments.?[status.name() == 'FAILED'].![amount]),1,'COMMA',2,'POINT') + ' ₽' : '0,00 ₽'}">0 ₽</div>
        </article>
    </section>

    <section class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
        <form method="get" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div class="md:col-span-2">
                <label class="text-xs font-semibold text-slate-500 uppercase">Сортировка</label>
                <select name="sort" class="mt-1.5 w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-blue-500">
                    <option value="paymentDate" th:selected="${sort == 'paymentDate'}">Дата оплаты</option>
                    <option value="amount" th:selected="${sort == 'amount'}">Сумма</option>
                    <option value="status" th:selected="${sort == 'status'}">Статус</option>
                </select>
            </div>
            <button type="submit" class="px-4 py-2 rounded-lg border border-slate-200 text-sm font-medium hover:bg-slate-50">Применить</button>
            <a th:href="@{/payments}" class="px-4 py-2 rounded-lg border border-slate-200 text-sm font-medium hover:bg-slate-50 text-center">Сбросить</a>
        </form>
    </section>

    <section class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
        <div class="overflow-auto">
            <table class="w-full min-w-[860px] text-sm">
                <thead class="bg-slate-50 text-slate-500 uppercase text-xs">
                <tr>
                    <th class="px-5 py-3 text-left">ID транзакции</th>
                    <th class="px-5 py-3 text-left">Слушатель / курс</th>
                    <th class="px-5 py-3 text-left">Дата</th>
                    <th class="px-5 py-3 text-left">Сумма</th>
                    <th class="px-5 py-3 text-left">Статус</th>
                    <th class="px-5 py-3 text-left">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${payments}" class="border-t border-slate-100 hover:bg-slate-50/70">
                    <td class="px-5 py-4 text-slate-500" th:text="${'#PAY-' + p.id}"></td>
                    <td class="px-5 py-4">
                        <p class="font-semibold" th:text="${p.application.listenerFullName}"></p>
                        <p class="text-xs text-slate-500" th:text="${p.application.program.title}"></p>
                    </td>
                    <td class="px-5 py-4 text-slate-700" th:text="${p.paymentDate}"></td>
                    <td class="px-5 py-4 font-semibold" th:text="${#numbers.formatDecimal(p.amount,1,'COMMA',2,'POINT')} + ' ₽'"></td>
                    <td class="px-5 py-4">
                        <span th:if="${p.status.name() == 'PAID'}" class="px-2 py-1 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-700">Оплачено</span>
                        <span th:if="${p.status.name() == 'PENDING'}" class="px-2 py-1 rounded-full text-xs font-semibold bg-amber-100 text-amber-700">Ожидает</span>
                        <span th:if="${p.status.name() == 'FAILED'}" class="px-2 py-1 rounded-full text-xs font-semibold bg-rose-100 text-rose-700">Ошибка</span>
                    </td>
                    <td class="px-5 py-4">
                        <div class="flex items-center gap-2">
                            <a th:href="@{/payments/{id}/edit(id=${p.id})}" class="px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-50 text-xs">Редактировать</a>
                            <form th:action="@{/payments/{id}/delete(id=${p.id})}" method="post" class="inline"
                                  onsubmit="return confirm('Удалить платеж? Действие необратимо.');">
                                <button type="submit" class="px-3 py-1.5 rounded-lg border border-rose-200 text-rose-600 hover:bg-rose-50 text-xs">Удалить</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(payments)}">
                    <td colspan="6" class="px-5 py-8 text-center text-slate-500">Нет платежей для отображения</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
