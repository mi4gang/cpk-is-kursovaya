<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | ЦПК ИС</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<main class="auth-card">
    <h1>Вход в систему</h1>
    <p>Информационная система центра повышения квалификации</p>
    <p class="hint">Демо-аккаунты: admin/admin123, methodist/method123, teacher/teacher123, student/student123</p>

    <div th:if="${param.error}" class="alert">Неверный логин или пароль</div>
    <div th:if="${param.logout}" class="success">Вы вышли из системы</div>

    <form th:action="@{/login}" method="post">
        <label>Логин
            <input type="text" name="username" required>
        </label>
        <label>Пароль
            <input type="password" name="password" required>
        </label>
        <button type="submit">Войти</button>
    </form>
</main>
</body>
</html>
