<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Группа программы | ЦПК ИС</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        :root { --primary: #2563eb; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 380, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
<div th:replace="~{fragments :: roleHeader(${activeItem})}"></div>

<main class="max-w-7xl mx-auto px-5 lg:px-8 py-8 space-y-6">
    <section class="flex flex-wrap items-start justify-between gap-4">
        <div>
            <a th:href="@{/teacher/groups}" class="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-blue-600 mb-2">
                <span class="material-symbols-outlined !text-base">arrow_back</span>
                К списку групп
            </a>
            <h1 class="text-3xl font-bold tracking-tight" th:text="${program.title}">Программа</h1>
            <p class="text-slate-500 mt-1">Группа слушателей по выбранной программе.</p>
        </div>
        <a href="https://example.com" target="_blank" rel="noopener noreferrer"
           class="px-4 py-2 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700">
            Перейти в учебный портал
        </a>
    </section>

    <section th:if="${message != null}" class="rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700"
             th:text="${message}">
        Прогресс сохранен.
    </section>
    <section th:if="${error != null}" class="rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700"
             th:text="${error}">
        Ошибка.
    </section>

    <section class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
        <div class="overflow-auto">
            <table class="w-full min-w-[1120px] text-sm">
                <thead class="bg-slate-50 text-slate-500 uppercase text-xs">
                <tr>
                    <th class="px-4 py-3 text-left">Слушатель</th>
                    <th class="px-4 py-3 text-left">Прогресс</th>
                    <th class="px-4 py-3 text-left">Аттестация</th>
                    <th class="px-4 py-3 text-left">Завершение</th>
                    <th class="px-4 py-3 text-left">Удостоверение</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${applications}" class="border-t border-slate-100 hover:bg-slate-50/70">
                    <td class="px-4 py-3">
                        <p class="font-semibold" th:text="${a.listenerFullName}"></p>
                        <p class="text-xs text-slate-500" th:text="${a.listenerEmail}"></p>
                    </td>
                    <td class="px-4 py-3">
                        <form th:action="@{/teacher/groups/{programId}/applications/{id}/progress(programId=${program.id},id=${a.id})}" method="post" class="flex items-center gap-2">
                            <input type="number" min="0" max="100" name="progressPercent" th:value="${a.progressPercent}"
                                   class="w-20 px-2 py-1.5 rounded-lg border border-slate-200" required>
                            <button type="submit" class="px-3 py-1.5 rounded-lg bg-blue-600 text-white text-xs font-semibold hover:bg-blue-700"
                                    th:disabled="${a.teacherCompleted}">Обновить</button>
                        </form>
                    </td>
                    <td class="px-4 py-3">
                        <div class="flex items-center gap-2">
                            <span th:if="${a.assessmentResult == null}" class="px-2 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-semibold">Нет результата</span>
                            <span th:if="${a.assessmentResult != null and a.assessmentResult.status.name() == 'PASSED'}" class="px-2 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-semibold"
                                  th:text="${a.assessmentResult.status.label + ' (' + a.assessmentResult.score + ')'}"></span>
                            <span th:if="${a.assessmentResult != null and a.assessmentResult.status.name() == 'NOT_PASSED'}" class="px-2 py-1 rounded-full bg-amber-100 text-amber-700 text-xs font-semibold"
                                  th:text="${a.assessmentResult.status.label + ' (' + a.assessmentResult.score + ')'}"></span>
                            <a th:if="${a.assessmentResult == null}" th:href="@{/assessments/new(applicationId=${a.id},fromProgramId=${program.id})}"
                               class="text-blue-600 hover:underline text-xs">Добавить</a>
                            <a th:if="${a.assessmentResult != null}" th:href="@{/assessments/{id}/edit(id=${a.assessmentResult.id},fromProgramId=${program.id})}"
                               class="text-blue-600 hover:underline text-xs">Редактировать</a>
                        </div>
                    </td>
                    <td class="px-4 py-3">
                        <span th:if="${a.teacherCompleted}" class="px-2 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-semibold">Завершено</span>
                        <form th:if="${!a.teacherCompleted}" th:action="@{/teacher/groups/{programId}/applications/{id}/complete(programId=${program.id},id=${a.id})}" method="post" class="inline"
                              onsubmit="return confirm('Завершить обучение по заявке?');">
                            <button type="submit" class="px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-semibold hover:bg-slate-50">
                                Завершить
                            </button>
                        </form>
                    </td>
                    <td class="px-4 py-3">
                        <span th:if="${a.certificate != null}" class="text-emerald-700 text-xs font-semibold">Выдано</span>
                        <span th:if="${a.certificate == null}" class="text-slate-500 text-xs">Не выдано</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(applications)}">
                    <td colspan="5" class="px-4 py-8 text-center text-slate-500">В группе пока нет слушателей.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
