spring.application.name=cpk-is
server.port=${PORT:8080}
app.seed.mode=${APP_SEED_MODE:once}
spring.profiles.default=dev

spring.datasource.url=${DB_URL:jdbc:h2:mem:cpk_is;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=true

server.error.whitelabel.enabled=false
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:never}
server.error.include-binding-errors=${SERVER_ERROR_INCLUDE_BINDING_ERRORS:never}

spring.mvc.hiddenmethod.filter.enabled=true
