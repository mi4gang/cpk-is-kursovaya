databases:
  - name: cpk-is-db
    databaseName: cpk_is
    user: cpk_user
    plan: free

services:
  - type: web
    name: cpk-is-web
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    envVars:
      - key: DB_URL
        fromDatabase:
          name: cpk-is-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: cpk-is-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cpk-is-db
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_PROFILES_ACTIVE
        value: render
